; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

;; build flags: GPSDEBUG, MYWIRE for rp2350, SAMD_REG_DUMP for samd,

[env]
framework = arduino

[env:seeed_xiao]
build_src_filter = +<drivemany.cpp> +<playsong.cpp>
platform = atmelsam
board = seeed_xiao
lib_deps = 
        /work/tools/oledtest/oledh
	/work/tools/oledtest/PCF8563-Arduino-Library

[env:seeed_xiao_gps]
build_src_filter = +<drivegps.cpp> +<playsong.cpp>
platform = atmelsam
board = seeed_xiao
lib_deps = 
        /work/tools/oledtest/oledh
	/work/tools/oledtest/PCF8563-Arduino-Library
	mikalhart/TinyGPSPlus@^1.0.3

;; 2022-02-10 xiaorp2040 will become standard,
;;    but for now explicitly call out below
;;    bare metal
[env:seeed_xiao_rp2040]
build_src_filter = +<drivemany.cpp> +<playsong.cpp>
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2040
framework = arduino
board_build.core = earlephilhower
;; Flash size: Code-2M, FS-0M     ;; default?
;;             Code-1.5M, FC-0.5M
;;board_build.filesystem_size = 0.5m
lib_deps = 
        /work/tools/oledtest/oledh
